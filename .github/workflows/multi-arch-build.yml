name: Multi-Architecture Docker Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  DOCKER_HUB_USER: leehyeontae

jobs:
  build-multi-arch:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: control-panel
            path: ./apps/control-panel
          - name: k6-runner
            path: ./apps/k6-runner-v2
          - name: mock-server
            path: ./apps/mock-server
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ env.DOCKER_HUB_USER }}
        password: ${{ secrets.DOCKER_HUB_PASSWORD }}
    
    - name: Get Git SHA
      id: git
      run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
    
    - name: Build and push ${{ matrix.service.name }}
      uses: docker/build-push-action@v5
      with:
        context: ${{ matrix.service.path }}
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          ${{ env.DOCKER_HUB_USER }}/k6-testing-platform-${{ matrix.service.name }}:${{ steps.git.outputs.sha }}
          ${{ env.DOCKER_HUB_USER }}/k6-testing-platform-${{ matrix.service.name }}:latest
        cache-from: type=registry,ref=${{ env.DOCKER_HUB_USER }}/k6-testing-platform-${{ matrix.service.name }}:buildcache
        cache-to: type=registry,ref=${{ env.DOCKER_HUB_USER }}/k6-testing-platform-${{ matrix.service.name }}:buildcache,mode=max

  # Optional: Trigger IAC update after successful builds
  update-iac:
    needs: build-multi-arch
    runs-on: ubuntu-latest
    if: success()
    steps:
    - name: Checkout IAC repository
      uses: actions/checkout@v4
      with:
        repository: inhuman-z/local_k8s
        token: ${{ secrets.IAC_REPO_TOKEN }}
        path: iac-repo
    
    - name: Get Git SHA
      id: git
      run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
    
    - name: Update Helm values
      run: |
        cd iac-repo
        # Update image tags in values.yaml files
        sed -i "s/tag: .*/tag: ${{ steps.git.outputs.sha }}/" helm/control-panel/values.yaml
        sed -i "s/tag: .*/tag: ${{ steps.git.outputs.sha }}/" helm/k6-runner/values.yaml
        sed -i "s/tag: .*/tag: ${{ steps.git.outputs.sha }}/" helm/mock-server/values.yaml
    
    - name: Commit and push changes
      run: |
        cd iac-repo
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add .
        git commit -m "Update image tags to ${{ steps.git.outputs.sha }} (multi-arch build)"
        git push