kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: k6-cluster
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30000
        hostPort: 3000
        protocol: TCP
      - containerPort: 30002
        hostPort: 3002
        protocol: TCP
      - containerPort: 30665
        hostPort: 5665
        protocol: TCP
  - role: worker
    labels:
      node-role: main-services
  - role: worker
    labels:
      node-role: k6-runner
