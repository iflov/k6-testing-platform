# Default values for k6-runner
replicaCount: 1

image:
  repository: k6-testing-platform-k6-runner
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: NodePort
  ports:
    - name: api
      port: 3002
      targetPort: 3002
      nodePort: 30002
      protocol: TCP
    - name: dashboard
      port: 5665
      targetPort: 5665
      nodePort: 30665
      protocol: TCP

# Node selector to place on main-services node
nodeSelector:
  workload: main-services

influxdb:
  url: "http://influxdb.k6-platform.svc.cluster.local:8086"
  org: "k6org"
  bucket: "k6"
  token: "apiv3_TMZp_DEszlT1GKMOLEOrxenxBvllSg9M-89-Sp9lOjCYvLFM9F6RuZieutMxtDQz00BrZLZmdynDhjgpHEPmww"  # For local development

mockServer:
  url: "http://mock-server-service.k6-platform.svc.cluster.local:3001"

k6Dashboard:
  enabled: true
  host: "0.0.0.0"
  port: "5665"
  period: "1s"

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

env:
  NODE_ENV: development
  PORT: "3002"