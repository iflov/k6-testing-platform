# Single node cluster values - no node selector
image:
  repository: k6-testing-platform-k6-runner
  pullPolicy: Never
  tag: "local"

# Remove node selector for single node
nodeSelector: null

influxdb:
  url: "http://influxdb:8086"
  org: "k6org"
  bucket: "k6"
  # Token should be provided via --set or values override file for security
  # token: "your-influxdb-token-here"
  
mockServer:
  url: "http://mock-server-service:3001"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi