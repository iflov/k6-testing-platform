# Single node cluster values - no node selector
image:
  repository: k6-testing-platform-k6-runner
  pullPolicy: Never
  tag: "local"

# Remove node selector for single node
nodeSelector: null

influxdb:
  url: "http://influxdb:8181"
  
mockServer:
  url: "http://mock-server-service:3001"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi