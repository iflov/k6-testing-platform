# Default values for control-panel
replicaCount: 1

image:
  repository: k6-testing-platform-control-panel
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: NodePort
  port: 3000
  nodePort: 30000

# Node selector to place on main-services node
nodeSelector:
  workload: main-services

database:
  host: "postgres-service.k6-platform.svc.cluster.local"
  port: "5432"
  name: "k6_test_history"
  username: "test_admin"
  # Password will be from secret

influxdb:
  url: "http://influxdb.k6-platform.svc.cluster.local:8086"
  org: "k6org"
  bucket: "k6"
  # Token should be provided via --set or values override file for security
  # token: "your-influxdb-token-here"

k6runner:
  baseUrl: "http://k6-runner-service.k6-platform.svc.cluster.local:3002"

mockServer:
  url: "http://mock-server-service.k6-platform.svc.cluster.local:3001"

k6dashboard:
  url: "http://k6-runner-service.k6-platform.svc.cluster.local:5665"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

env:
  NODE_ENV: development