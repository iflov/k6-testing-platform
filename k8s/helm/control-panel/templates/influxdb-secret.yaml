apiVersion: v1
kind: Secret
metadata:
  name: influxdb-secret
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
    component: control-panel
type: Opaque
data:
  # Default token for development (base64 encoded "dev-token-for-testing")
  # In production, this should be replaced with actual InfluxDB token
  token: {{ .Values.influxdb.token | default "ZGV2LXRva2VuLWZvci10ZXN0aW5n" | b64enc | quote }}