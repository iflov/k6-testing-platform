# Local values for InfluxDB using Bitnami chart
# This overrides the default Bitnami InfluxDB chart values

# Use same version as infrastructure team
image:
  registry: docker.io
  repository: bitnami/influxdb
  tag: 3.3.0-debian-12-r34

# Node selector - disabled for single node
nodeSelector: {}

# Authentication settings
auth:
  enabled: true
  admin:
    username: admin
    password: admin123
    token: local-dev-token-12345
    org: k6org
    bucket: k6
  
# Service configuration
service:
  type: NodePort
  nodePorts:
    http: 30086

# Persistence for local development
persistence:
  enabled: true
  size: 2Gi
  storageClass: standard

# Resources for local development
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

# Disable metrics for local
metrics:
  enabled: false