apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-init
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  template:
    metadata:
      name: {{ .Release.Name }}-init
    spec:
      restartPolicy: OnFailure
      containers:
      - name: influxdb-init
        image: {{ .Values.influxdb.image.registry }}/{{ .Values.influxdb.image.repository }}:{{ .Values.influxdb.image.tag }}
        command:
        - /bin/bash
        - -c
        - |
          set -e
          echo "Waiting for InfluxDB to be ready..."
          until curl -s http://{{ .Release.Name }}:{{ .Values.influxdb.service.ports.http }}/api/v0/health; do
            echo "Waiting for InfluxDB..."
            sleep 5
          done
          
          echo "Creating admin token..."
          TOKEN=$(influxdb3 create token --admin --host http://{{ .Release.Name }}:{{ .Values.influxdb.service.ports.http }} | grep "Token:" | awk '{print $2}')
          
          if [ -z "$TOKEN" ]; then
            echo "Failed to create token"
            exit 1
          fi
          
          echo "Admin token created successfully"
          
          # Store token in a secret
          kubectl create secret generic {{ .Release.Name }}-admin-token \
            --namespace={{ .Release.Namespace }} \
            --from-literal=token="$TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -
          
          echo "Creating k6 database..."
          influxdb3 create database {{ .Values.database.name }} \
            --host http://{{ .Release.Name }}:{{ .Values.influxdb.service.ports.http }} \
            --token "$TOKEN" || echo "Database might already exist"
          
          echo "InfluxDB initialization complete!"
      serviceAccountName: {{ .Release.Name }}-init-sa
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-init-sa
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-init-role
  namespace: {{ .Release.Namespace }}
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["create", "patch", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-init-rolebinding
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-init-role
subjects:
- kind: ServiceAccount
  name: {{ .Release.Name }}-init-sa
  namespace: {{ .Release.Namespace }}