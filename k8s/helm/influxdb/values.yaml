# Default values for influxdb-wrapper
database:
  name: k6
  org: k6org

# Configuration for Bitnami InfluxDB subchart
influxdb:
  image:
    registry: docker.io
    repository: bitnami/influxdb
    tag: 3.3.0-debian-12-r34
  
  auth:
    enabled: false  # We'll manage auth through init job
  
  service:
    type: NodePort
    ports:
      http: 8181
    nodePorts:
      http: 30086
  
  persistence:
    enabled: true
    size: 2Gi
    storageClass: standard
  
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi
  
  metrics:
    enabled: false