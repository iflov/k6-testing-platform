# Default values for mock-server
replicaCount: 1

image:
  repository: k6-testing-platform-mock-server
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: NodePort
  port: 3001
  nodePort: 30001

# IMPORTANT: Node selector to place ONLY on mock-server node
nodeSelector:
  workload: mock-server

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

env:
  NODE_ENV: development
  PORT: "3001"