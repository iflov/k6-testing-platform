image: alpine:latest

pipelines:
  default:
    - step:
        name: Test SSH Connection to IAC Repository
        script:
          - apk add --no-cache git openssh-client
          - echo "========================================="
          - echo "Starting SSH Configuration Test"
          - echo "========================================="
          - if [ -z "$CONFIG_REPO_SSH_KEY" ]; then echo "ERROR CONFIG_REPO_SSH_KEY is not set"; exit 1; else echo "CONFIG_REPO_SSH_KEY is set"; fi
          - if [ -z "$CONFIG_REPO_URL" ]; then echo "ERROR CONFIG_REPO_URL is not set"; exit 1; else echo "CONFIG_REPO_URL is set $CONFIG_REPO_URL"; fi
          - echo "========================================="
          - echo "Setting up SSH..."
          - echo "========================================="
          - mkdir -p ~/.ssh
          - echo "$CONFIG_REPO_SSH_KEY" | base64 -d > ~/.ssh/id_rsa
          - chmod 600 ~/.ssh/id_rsa
          - if [ -f ~/.ssh/id_rsa ]; then echo "SSH key file created"; ls -la ~/.ssh/id_rsa; head -n 1 ~/.ssh/id_rsa; else echo "Failed to create SSH key"; exit 1; fi
          - echo "========================================="
          - echo "Adding Bitbucket to known hosts..."
          - echo "========================================="
          - ssh-keyscan -H bitbucket.org >> ~/.ssh/known_hosts
          - echo "Bitbucket added to known hosts"
          - echo "========================================="
          - echo "Testing SSH connection to Bitbucket..."
          - echo "========================================="
          - ssh -vT git@bitbucket.org 2>&1 || true
          - echo "========================================="
          - echo "Attempting to clone IAC repository..."
          - echo "========================================="
          - echo "Repository URL $CONFIG_REPO_URL"
          - GIT_SSH_COMMAND="ssh -v" git clone $CONFIG_REPO_URL /tmp/iac-repo || (echo "Failed to clone repository"; echo "Check 1. CONFIG_REPO_SSH_KEY has base64 private key"; echo "Check 2. Public key is in IAC repo Access Keys"; echo "Check 3. CONFIG_REPO_URL format"; exit 1)
          - echo "Successfully cloned IAC repository"
          - ls -la /tmp/iac-repo/
          - if [ -d "/tmp/iac-repo/helm" ]; then echo "Helm directory found"; ls -la /tmp/iac-repo/helm/; else echo "Helm directory not found"; fi
          - echo "========================================="
          - echo "All tests passed successfully!"
          - echo "=========================================="
