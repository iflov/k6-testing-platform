# yaml-language-server: $schema=https://bitbucket.org/pipelines-json-schema/pipelines-schema.json
image: atlassian/default-image:4

options:
  docker: true

definitions:
  services:
    docker:
      memory: 4096

pipelines:
  branches:
    # main 브랜치: 테스트 → Docker 빌드/푸시 → IAC 저장소 업데이트
    main:
      # 1단계: K6 Runner 테스트 실행
      - parallel:
          - step:
              name: Test K6 Runner
              image: node:22-slim
              caches:
                - node
              script:
                - echo "🧪 K6 Runner 테스트 시작..."
                - cd apps/k6-runner-v2
                - npm ci
                - npm run lint
                - npm test
                - echo "✅ K6 Runner 테스트 성공!"

      # 2단계: Docker 이미지 병렬 빌드 및 푸시 (성능 최적화)
      - parallel:
          # Control Panel 빌드
          - step:
              name: Build Control Panel
              deployment: production
              services:
                - docker
              caches:
                - docker
              script:
                - export DOCKER_BUILDKIT=1
                - docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
                - docker buildx create --name builder-cp --use
                - docker buildx inspect --bootstrap
                - echo $DOCKER_HUB_PASSWORD | docker login -u $DOCKER_HUB_USERNAME --password-stdin || exit 1
                - export GIT_COMMIT=$(git rev-parse --short HEAD)
                - echo "🏷️ Control Panel 빌드 중: $GIT_COMMIT"
                - docker buildx build --platform linux/amd64,linux/arm64 --cache-from type=registry,ref=$DOCKER_HUB_USERNAME/k6-testing-platform-control-panel:cache --cache-to type=inline --tag $DOCKER_HUB_USERNAME/k6-testing-platform-control-panel:$GIT_COMMIT --tag $DOCKER_HUB_USERNAME/k6-testing-platform-control-panel:latest --push ./apps/control-panel
                - echo "✅ Control Panel 푸시 완료"

          # K6 Runner 빌드
          - step:
              name: Build K6 Runner
              deployment: production
              services:
                - docker
              caches:
                - docker
              script:
                - export DOCKER_BUILDKIT=1
                - docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
                - docker buildx create --name builder-k6 --use
                - docker buildx inspect --bootstrap
                - echo $DOCKER_HUB_PASSWORD | docker login -u $DOCKER_HUB_USERNAME --password-stdin || exit 1
                - export GIT_COMMIT=$(git rev-parse --short HEAD)
                - echo "🏷️ K6 Runner 빌드 중: $GIT_COMMIT"
                - docker buildx build --platform linux/amd64,linux/arm64 --cache-from type=registry,ref=$DOCKER_HUB_USERNAME/k6-testing-platform-k6-runner:cache --cache-to type=inline --tag $DOCKER_HUB_USERNAME/k6-testing-platform-k6-runner:$GIT_COMMIT --tag $DOCKER_HUB_USERNAME/k6-testing-platform-k6-runner:latest --push ./apps/k6-runner-v2
                - echo "✅ K6 Runner 푸시 완료"

          # Mock Server 빌드
          - step:
              name: Build Mock Server
              deployment: production
              services:
                - docker
              caches:
                - docker
              script:
                - export DOCKER_BUILDKIT=1
                - docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
                - docker buildx create --name builder-mock --use
                - docker buildx inspect --bootstrap
                - echo $DOCKER_HUB_PASSWORD | docker login -u $DOCKER_HUB_USERNAME --password-stdin || exit 1
                - export GIT_COMMIT=$(git rev-parse --short HEAD)
                - echo "🏷️ Mock Server 빌드 중: $GIT_COMMIT"
                - docker buildx build --platform linux/amd64,linux/arm64 --cache-from type=registry,ref=$DOCKER_HUB_USERNAME/k6-testing-platform-mock-server:cache --cache-to type=inline --tag $DOCKER_HUB_USERNAME/k6-testing-platform-mock-server:$GIT_COMMIT --tag $DOCKER_HUB_USERNAME/k6-testing-platform-mock-server:latest --push ./apps/mock-server
                - echo "✅ Mock Server 푸시 완료"

      # 3단계: IAC Repository 업데이트 (Helm values.yaml 수정)
      - step:
          name: Update IAC Repository (Helm Values)
          image: alpine:latest
          script:
            # 필수 도구 설치 (git, yq, ssh)
            - apk add --no-cache git wget openssh-client
            - wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            - chmod +x /usr/local/bin/yq

            # Config Repository 접근을 위한 SSH 설정
            - mkdir -p ~/.ssh
            - echo "$CONFIG_REPO_SSH_KEY" | base64 -d > ~/.ssh/id_rsa
            - chmod 600 ~/.ssh/id_rsa
            - ssh-keyscan -H bitbucket.org >> ~/.ssh/known_hosts

            # IAC Repository 클론
            - echo "📥 IAC 저장소 클론 중..."
            - git clone $CONFIG_REPO_URL /tmp/iac-repo
            - cd /tmp/iac-repo

            # 메인 저장소의 git commit SHA와 현재 날짜 가져오기
            - export GIT_COMMIT=$(cd $BITBUCKET_CLONE_DIR && git rev-parse --short HEAD)
            - export CURRENT_DATE=$(date +"%Y-%m-%d %H:%M:%S")
            - echo "🏷️ 이미지 태그 업데이트 중: $GIT_COMMIT"

            # Helm Chart의 이미지 태그 업데이트
            - echo "📝 Helm values.yaml 파일 업데이트 중..."
            - yq eval -i ".image.tag = \"$GIT_COMMIT\"" helm/control-panel/values.yaml
            - yq eval -i ".image.tag = \"$GIT_COMMIT\"" helm/k6-runner/values.yaml
            - yq eval -i ".image.tag = \"$GIT_COMMIT\"" helm/mock-server/values.yaml
            - echo "✅ Helm values 업데이트 완료"

            # Git 사용자 설정
            - git config user.email "$GIT_USER_EMAIL"
            - git config user.name "$GIT_USER_NAME"

            # Git 작업 실행: add, commit, push
            - echo "🔧 Git 명령어 실행 중..."
            - git add .
            - git commit -m "Update By CI/CD at $CURRENT_DATE - Image tag: $GIT_COMMIT"
            - git push origin main
            - echo "🚀 IAC 저장소에 변경사항 푸시 완료 (ArgoCD webhook 트리거됨)"
# Bitbucket 저장소 설정에서 설정해야 할 필수 환경 변수:
# - DOCKER_HUB_USERNAME: Docker Hub 사용자명 (예: leehyeontae)
# - DOCKER_HUB_PASSWORD: Docker Hub 액세스 토큰 (비밀번호 아님)
# - CONFIG_REPO_URL: Config 저장소 URL (git@bitbucket.org:inhuman-z/local_k8s.git)
# - CONFIG_REPO_SSH_KEY: Config 저장소 접근용 Base64 인코딩된 SSH 개인키
# - GIT_USER_EMAIL: Git 커밋 이메일
# - GIT_USER_NAME: Git 커밋 사용자명 (예: "CI Pipeline")
