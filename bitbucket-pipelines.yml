image: atlassian/default-image:4

options:
  docker: true

definitions:
  services:
    docker:
      memory: 3072

pipelines:
  branches:
    # 모든 브랜치에서 테스트 실행 (main 브랜치 제외)
    "**":
      - parallel:
          - step:
              name: Test K6 Runner
              image: node:22-slim
              caches:
                - node
              script:
                - cd apps/k6-runner-v2
                - npm ci
                - npm run lint
                - npm test

    # main 브랜치: 테스트 → Docker 빌드/푸시 → IAC 저장소 업데이트
    main:
      # 1단계: K6 Runner 테스트 실행
      - parallel:
          - step:
              name: Test K6 Runner
              image: node:22-slim
              caches:
                - node
              script:
                - echo Starting K6 Runner tests
                - cd apps/k6-runner-v2
                - npm ci
                - npm run lint
                - npm test
                - echo K6 Runner tests passed

      # 2단계: Production 배포 Stage (Docker 빌드 및 IAC 업데이트)
      - stage:
          name: Production Deployment
          deployment: production
          steps:
            - step:
                name: Build Control Panel
                services:
                  - docker
                caches:
                  - docker
                script:
                  - export DOCKER_BUILDKIT=1
                  - echo $DOCKER_HUB_PASSWORD | docker login -u $DOCKER_HUB_USERNAME --password-stdin || exit 1
                  - export GIT_COMMIT=$(git rev-parse --short HEAD)
                  - echo "Control Panel build started"
                  # Try buildx without privileged mode - uses default docker driver
                  - |
                    if docker buildx version > /dev/null 2>&1; then
                      echo "Using buildx for multi-arch build"
                      docker buildx build --platform linux/amd64,linux/arm64 \
                        --tag $DOCKER_HUB_USERNAME/k6-testing-platform-control-panel:$GIT_COMMIT \
                        --tag $DOCKER_HUB_USERNAME/k6-testing-platform-control-panel:latest \
                        --push ./apps/control-panel
                    else
                      echo "Fallback to standard build (amd64 only)"
                      docker build -t $DOCKER_HUB_USERNAME/k6-testing-platform-control-panel:$GIT_COMMIT \
                        -t $DOCKER_HUB_USERNAME/k6-testing-platform-control-panel:latest ./apps/control-panel
                      docker push $DOCKER_HUB_USERNAME/k6-testing-platform-control-panel:$GIT_COMMIT
                      docker push $DOCKER_HUB_USERNAME/k6-testing-platform-control-panel:latest
                    fi
                  - echo "Control Panel push completed"

            - step:
                name: Build K6 Runner
                services:
                  - docker
                caches:
                  - docker
                script:
                  - export DOCKER_BUILDKIT=1
                  - echo $DOCKER_HUB_PASSWORD | docker login -u $DOCKER_HUB_USERNAME --password-stdin || exit 1
                  - export GIT_COMMIT=$(git rev-parse --short HEAD)
                  - echo "K6 Runner build started"
                  # Try buildx without privileged mode - uses default docker driver
                  - |
                    if docker buildx version > /dev/null 2>&1; then
                      echo "Using buildx for multi-arch build"
                      docker buildx build --platform linux/amd64,linux/arm64 \
                        --tag $DOCKER_HUB_USERNAME/k6-testing-platform-k6-runner:$GIT_COMMIT \
                        --tag $DOCKER_HUB_USERNAME/k6-testing-platform-k6-runner:latest \
                        --push ./apps/k6-runner-v2
                    else
                      echo "Fallback to standard build (amd64 only)"
                      docker build -t $DOCKER_HUB_USERNAME/k6-testing-platform-k6-runner:$GIT_COMMIT \
                        -t $DOCKER_HUB_USERNAME/k6-testing-platform-k6-runner:latest ./apps/k6-runner-v2
                      docker push $DOCKER_HUB_USERNAME/k6-testing-platform-k6-runner:$GIT_COMMIT
                      docker push $DOCKER_HUB_USERNAME/k6-testing-platform-k6-runner:latest
                    fi
                  - echo "K6 Runner push completed"

            - step:
                name: Build Mock Server
                services:
                  - docker
                caches:
                  - docker
                script:
                  - export DOCKER_BUILDKIT=1
                  - echo $DOCKER_HUB_PASSWORD | docker login -u $DOCKER_HUB_USERNAME --password-stdin || exit 1
                  - export GIT_COMMIT=$(git rev-parse --short HEAD)
                  - echo "Mock Server build started"
                  # Try buildx without privileged mode - uses default docker driver
                  - |
                    if docker buildx version > /dev/null 2>&1; then
                      echo "Using buildx for multi-arch build"
                      docker buildx build --platform linux/amd64,linux/arm64 \
                        --tag $DOCKER_HUB_USERNAME/k6-testing-platform-mock-server:$GIT_COMMIT \
                        --tag $DOCKER_HUB_USERNAME/k6-testing-platform-mock-server:latest \
                        --push ./apps/mock-server
                    else
                      echo "Fallback to standard build (amd64 only)"
                      docker build -t $DOCKER_HUB_USERNAME/k6-testing-platform-mock-server:$GIT_COMMIT \
                        -t $DOCKER_HUB_USERNAME/k6-testing-platform-mock-server:latest ./apps/mock-server
                      docker push $DOCKER_HUB_USERNAME/k6-testing-platform-mock-server:$GIT_COMMIT
                      docker push $DOCKER_HUB_USERNAME/k6-testing-platform-mock-server:latest
                    fi
                  - echo "Mock Server push completed"

            # IAC Repository 업데이트 (Helm values.yaml 수정)
            - step:
                name: Update IAC Repository (Helm Values)
                image: alpine:latest
                script:
                  - apk add --no-cache git wget openssh-client
                  - wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
                  - chmod +x /usr/local/bin/yq
                  - mkdir -p ~/.ssh
                  - echo "$CONFIG_REPO_SSH_KEY" | base64 -d > ~/.ssh/id_rsa
                  - chmod 600 ~/.ssh/id_rsa
                  - ssh-keyscan -H bitbucket.org >> ~/.ssh/known_hosts
                  - ssh -T git@bitbucket.org || true
                  - echo "Cloning IAC repository from $CONFIG_REPO_URL"
                  - git clone $CONFIG_REPO_URL /tmp/iac-repo || exit 1
                  - cd /tmp/iac-repo
                  - git config user.email "$GIT_USER_EMAIL"
                  - git config user.name "$GIT_USER_NAME"
                  - export GIT_COMMIT=$(cd $BITBUCKET_CLONE_DIR && git rev-parse --short HEAD)
                  - export CURRENT_DATE=$(date +"%Y-%m-%d %H:%M:%S")
                  - echo "Updating Helm values.yaml files with tag $GIT_COMMIT"
                  - yq eval -i ".image.tag = \"$GIT_COMMIT\"" helm/control-panel/values.yaml
                  - yq eval -i ".image.tag = \"$GIT_COMMIT\"" helm/k6-runner/values.yaml
                  - yq eval -i ".image.tag = \"$GIT_COMMIT\"" helm/mock-server/values.yaml
                  - echo "Helm values update completed"
                  - git diff
                  - git add .
                  - |
                    if git diff --staged --quiet; then
                      echo "No changes to commit"
                    else
                      git commit -m "Update By CI/CD at $CURRENT_DATE - Image tag: $GIT_COMMIT"
                      git push origin main || {
                        echo "Push failed. Checking remote configuration..."
                        git remote -v
                        exit 1
                      }
                    fi
                  - echo "Changes pushed to IAC repository"
# Bitbucket 저장소 설정에서 설정해야 할 필수 환경 변수:
# - DOCKER_HUB_USERNAME: Docker Hub 사용자명 (예: leehyeontae)
# - DOCKER_HUB_PASSWORD: Docker Hub 액세스 토큰 (비밀번호 아님)
# - CONFIG_REPO_URL: Config 저장소 URL (git@bitbucket.org:inhuman-z/local_k8s.git)
# - CONFIG_REPO_SSH_KEY: Config 저장소 접근용 Base64 인코딩된 SSH 개인키
# - GIT_USER_EMAIL: Git 커밋 이메일
# - GIT_USER_NAME: Git 커밋 사용자명 (예: "CI Pipeline")
