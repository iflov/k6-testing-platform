services:
  # Control Panel - Next.js UI
  control-panel:
    build:
      context: ./apps/control-panel
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./apps/control-panel/.env
    environment:
      # PostgreSQL connection for Docker network
      - DB_HOST=postgres
      - DB_PORT=5432
      # K6 Runner and Mock Server URLs for Docker network
      - K6_RUNNER_BASE_URL=http://k6-runner:3002
      - MOCK_SERVER_URL=http://mock-server:3001
      - DATABASE_URL=postgresql://${POSTGRES_USER:-testuser}:${POSTGRES_PASSWORD:-testpassword}@postgres:5432/${POSTGRES_DB:-k6_test_history}?schema=public
    depends_on:
      - mock-server
      - influxdb
      - postgres
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # For Docker API access
      - /tmp:/tmp # For temporary test files
      # 개발용 소스 코드 마운트 (hot reload)
      - ./apps/control-panel:/app
      - /app/node_modules # node_modules 제외
      - /app/.next # .next 빌드 폴더 제외
    extra_hosts:
      - "host.docker.internal:host-gateway" # Allow access to host's localhost
    networks:
      - k6-network
    command: npm run dev # 개발 모드로 실행

  # Mock Server - Test target
  mock-server:
    build:
      context: ./apps/mock-server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ./apps/mock-server/.env
    networks:
      - k6-network
    # 로컬 개발 시에는 빌드된 이미지를 그대로 사용
    # 소스 코드 변경 시 docker-compose up --build mock-server로 재빌드

  # InfluxDB - Metrics storage
  influxdb:
    image: influxdb:1.8
    ports:
      - "8086:8086"
    env_file:
      - ./services/influxdb/.env
    environment:
      - INFLUXDB_DB=${INFLUXDB_DB:-k6}
      - INFLUXDB_HTTP_AUTH_ENABLED=false
    volumes:
      - influxdb-data:/var/lib/influxdb
      - ./services/influxdb/init-influxdb.sh:/docker-entrypoint-initdb.d/init-influxdb.sh:ro
    networks:
      - k6-network

  # K6 Runner - k6 테스트 실행 서비스
  k6-runner:
    build:
      context: ./apps/k6-runner
      dockerfile: Dockerfile
    ports:
      - "3002:3002" # API 포트
      - "5665:5665" # Web Dashboard 포트 (K6가 실행될 때 사용)
    env_file:
      - ./apps/k6-runner/.env
    depends_on:
      - mock-server
      - influxdb
    volumes:
      # 개발용 소스 코드 마운트 (hot reload)
      - ./apps/k6-runner:/app
      - /app/node_modules # node_modules 제외
      - /tmp:/tmp # 임시 파일용
    extra_hosts:
      - "host.docker.internal:host-gateway" # Allow access to host's localhost
    networks:
      - k6-network
    restart: unless-stopped

  # PostgreSQL - Test results storage
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    env_file:
      - ./services/postgres/.env
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./services/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - k6-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_admin -d Test"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  k6-network:
    driver: bridge

volumes:
  influxdb-data:
  postgres-data:
