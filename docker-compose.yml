services:
  # Control Panel - Next.js UI
  control-panel:
    build:
      context: ./apps/control-panel
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./apps/control-panel/.env
    depends_on:
      - mock-server
      - influxdb
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # For Docker API access
      - ./apps/k6-runner/k6-scripts:/scripts:ro # Mount K6 scripts as read-only
      - /tmp:/tmp # For temporary test files
      # 개발용 소스 코드 마운트 (hot reload)
      - ./apps/control-panel:/app
      - /app/node_modules # node_modules 제외
      - /app/.next # .next 빌드 폴더 제외
    extra_hosts:
      - "host.docker.internal:host-gateway" # Allow access to host's localhost
    networks:
      - k6-network
    command: npm run dev # 개발 모드로 실행

  # Mock Server - Test target
  mock-server:
    build:
      context: ./apps/mock-server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ./apps/mock-server/.env
    networks:
      - k6-network
    # 로컬 개발 시에는 빌드된 이미지를 그대로 사용
    # 소스 코드 변경 시 docker-compose up --build mock-server로 재빌드

  # InfluxDB - Metrics storage
  influxdb:
    image: influxdb:1.8
    ports:
      - "8086:8086"
    env_file:
      - ./services/influxdb/.env
    environment:
      - INFLUXDB_DB=k6
      - INFLUXDB_HTTP_AUTH_ENABLED=false
    volumes:
      - influxdb-data:/var/lib/influxdb
      - ./services/influxdb/init-influxdb.sh:/docker-entrypoint-initdb.d/init-influxdb.sh:ro
    networks:
      - k6-network

  # K6 Runner - k6 테스트 실행 서비스
  k6-runner:
    build:
      context: ./apps/k6-runner
      dockerfile: Dockerfile
    ports:
      - "3002:3002" # API 포트
      - "5665:5665" # Web Dashboard 포트 (K6가 실행될 때 사용)
    env_file:
      - ./apps/k6-runner/.env
    depends_on:
      - mock-server
      - influxdb
    volumes:
      # 개발용 소스 코드 마운트 (hot reload)
      - ./apps/k6-runner:/app
      - /app/node_modules # node_modules 제외
      - ./apps/k6-runner/k6-scripts:/app/k6-scripts:ro # K6 scripts 마운트
      - /tmp:/tmp # 임시 파일용
    extra_hosts:
      - "host.docker.internal:host-gateway" # Allow access to host's localhost
    networks:
      - k6-network
    restart: unless-stopped

networks:
  k6-network:
    driver: bridge

volumes:
  influxdb-data:
