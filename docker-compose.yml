version: "3.8"

services:
  # Control Panel - Next.js UI
  control-panel:
    build:
      context: ./apps/control-panel
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - K6_INFLUXDB_URL=http://influxdb:8086
      - MOCK_SERVER_URL=http://mock-server:3001
    depends_on:
      - mock-server
      - influxdb
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # For Docker API access
      - ./k6-scripts:/scripts:ro # Mount K6 scripts as read-only
      - /tmp:/tmp # For temporary test files
    networks:
      - k6-network

  # Mock Server - Test target
  mock-server:
    build:
      context: ./apps/mock-server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - ENABLE_DELAY=false
      - MIN_DELAY=0
      - MAX_DELAY=100
      - ENABLE_ERROR_SIMULATION=false
      - ERROR_RATE=5
    networks:
      - k6-network

  # InfluxDB - Metrics storage
  influxdb:
    image: influxdb:1.8
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=k6
      - INFLUXDB_ADMIN_USER=admin
      - INFLUXDB_ADMIN_PASSWORD=admin123
      - INFLUXDB_USER=k6
      - INFLUXDB_USER_PASSWORD=k6pass
    volumes:
      - influxdb-data:/var/lib/influxdb
    networks:
      - k6-network

  # K6 - Load testing tool (profile for manual runs)
  k6:
    image: grafana/k6:latest
    profiles:
      - test
    ports:
      - "5665:5665"  # k6 Web Dashboard default port
    environment:
      - TARGET_URL=http://mock-server:3001
      - VUS=10
      - DURATION=30s
      - K6_WEB_DASHBOARD=true
      - K6_WEB_DASHBOARD_HOST=0.0.0.0
      - K6_WEB_DASHBOARD_PORT=5665
      - K6_WEB_DASHBOARD_PERIOD=1s  # Update frequency
      - K6_WEB_DASHBOARD_EXPORT=/reports/test-report.html
    volumes:
      - ./k6-scripts:/scripts
      - ./reports:/reports
    command: run --out influxdb=http://influxdb:8086/k6 --out web-dashboard /scripts/scenarios/simple-load-test.js
    depends_on:
      - mock-server
      - influxdb
    networks:
      - k6-network

networks:
  k6-network:
    driver: bridge

volumes:
  influxdb-data:
