version: "3.8"

services:
  # Control Panel - Next.js UI
  control-panel:
    build:
      context: ./apps/control-panel
      dockerfile: Dockerfile
    ports:
      - "${CONTROL_PANEL_PORT}:3000"
    environment:
      - NODE_ENV=${NODE_ENV}
      - K6_INFLUXDB_URL=${K6_INFLUXDB_URL}
      - MOCK_SERVER_URL=${MOCK_SERVER_URL}
    depends_on:
      - mock-server
      - influxdb
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # For Docker API access
      - ./k6-scripts:/scripts:ro # Mount K6 scripts as read-only
      - /tmp:/tmp # For temporary test files
    networks:
      - k6-network

  # Mock Server - Test target
  mock-server:
    build:
      context: ./apps/mock-server
      dockerfile: Dockerfile
    ports:
      - "${MOCK_SERVER_PORT}:3001"
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=${MOCK_SERVER_PORT}
      - ENABLE_DELAY=${ENABLE_DELAY}
      - MIN_DELAY=${MIN_DELAY}
      - MAX_DELAY=${MAX_DELAY}
      - ENABLE_ERROR_SIMULATION=${ENABLE_ERROR_SIMULATION}
      - ERROR_RATE=${ERROR_RATE}
    networks:
      - k6-network

  # InfluxDB - Metrics storage
  influxdb:
    image: influxdb:1.8
    ports:
      - "${INFLUXDB_PORT}:8086"
    environment:
      - INFLUXDB_DB=${INFLUXDB_DB}
      - INFLUXDB_ADMIN_USER=${INFLUXDB_ADMIN_USER}
      - INFLUXDB_ADMIN_PASSWORD=${INFLUXDB_ADMIN_PASSWORD}
      - INFLUXDB_USER=${INFLUXDB_USER}
      - INFLUXDB_USER_PASSWORD=${INFLUXDB_USER_PASSWORD}
    volumes:
      - influxdb-data:/var/lib/influxdb
    networks:
      - k6-network

  # K6 Runner - k6 테스트 실행 서비스
  k6-runner:
    build:
      context: ./apps/k6-runner
      dockerfile: Dockerfile
    ports:
      - "${K6_RUNNER_API_PORT}:3002" # API 포트
      - "${K6_RUNNER_DASHBOARD_PORT}:5665" # Web Dashboard 포트
    environment:
      - NODE_ENV=${NODE_ENV}
      - INFLUXDB_URL=${INFLUXDB_URL}
      - MOCK_SERVER_URL=${MOCK_SERVER_URL}
    depends_on:
      - mock-server
      - influxdb
    networks:
      - k6-network
    restart: unless-stopped

networks:
  k6-network:
    driver: bridge

volumes:
  influxdb-data:
