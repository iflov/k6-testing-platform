services:
  # Control Panel - Next.js UI
  control-panel:
    build:
      context: ./apps/control-panel
      dockerfile: Dockerfile
    ports:
      - "${CONTROL_PANEL_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    env_file:
      - .env # 전역 환경 변수
      - ./apps/control-panel/.env # 앱별 환경 변수 (우선순위 높음)
    environment:
      # 내부 서비스 통신용 URL (Docker 네트워크)
      - DB_HOST=postgres
      - DB_PORT=5432
      - K6_RUNNER_BASE_URL=http://k6-runner:3002
      - MOCK_SERVER_URL=http://mock-server:3001
      - INFLUXDB_URL=http://influxdb:8181
      # 환경 변수로부터 가져오기
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - INFLUXDB_ORG=${INFLUXDB_ORG}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
      - NEXT_PUBLIC_K6_DASHBOARD_URL=${NEXT_PUBLIC_K6_DASHBOARD_URL:-http://localhost:${K6_DASHBOARD_PORT:-5665}}
      - NEXT_PUBLIC_K6_STATUS_POLL_INTERVAL_MS=${NEXT_PUBLIC_K6_STATUS_POLL_INTERVAL_MS:-1000}
      - NEXT_PUBLIC_K6_METRICS_POLL_INTERVAL_MS=${NEXT_PUBLIC_K6_METRICS_POLL_INTERVAL_MS:-1000}
      - NEXT_PUBLIC_K6_PROGRESS_POLL_INTERVAL_MS=${NEXT_PUBLIC_K6_PROGRESS_POLL_INTERVAL_MS:-1000}
      - NEXT_PUBLIC_K6_METRICS_TIME_RANGE=${NEXT_PUBLIC_K6_METRICS_TIME_RANGE:-30s}
      - K6_METRICS_DEFAULT_TIME_RANGE=${K6_METRICS_DEFAULT_TIME_RANGE:-30s}
      - K6_METRICS_STANDARD_TIME_RANGE=${K6_METRICS_STANDARD_TIME_RANGE:-5m}
      - NODE_ENV=${NODE_ENV:-development}
    depends_on:
      - mock-server
      - influxdb
      - postgres
    volumes:
      - /tmp:/tmp # For temporary test files
      # 개발용 소스 코드 마운트 (hot reload)
      - ./apps/control-panel:/app
      - /app/node_modules # node_modules 제외
      - /app/.next # .next 빌드 폴더 제외
    extra_hosts:
      - "host.docker.internal:host-gateway" # Allow access to host's localhost
    networks:
      - k6-network
    command: npm run dev # 개발 모드로 실행

  # Mock Server - Test target
  mock-server:
    build:
      context: ./apps/mock-server
      dockerfile: Dockerfile
    ports:
      - "${MOCK_SERVER_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    env_file:
      - .env # 전역 환경 변수
      - ./apps/mock-server/.env # 앱별 환경 변수 (우선순위 높음)
    environment:
      - NODE_ENV=${NODE_ENV:-development}
    networks:
      - k6-network

  # InfluxDB 3.x Core - Metrics storage
  influxdb:
    image: quay.io/influxdb/influxdb3-core:latest
    ports:
      - "${INFLUXDB_PORT:-8181}:8181"
    environment:
      # InfluxDB 3.x Core configuration
      - INFLUXDB_HTTP_BIND_ADDRESS=:8181
      - INFLUXDB_REPORTING_DISABLED=true
      # Data directory
      - INFLUXDB_DATA_DIR=/var/lib/influxdb3
      # Authentication token from .env
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - INFLUXDB_ORG=${INFLUXDB_ORG}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
    volumes:
      - influxdb-data:/var/lib/influxdb3
      - ./services/influxdb/init-influxdb.sh:/docker-entrypoint-initdb.d/init-influxdb.sh:ro
    networks:
      - k6-network
    command: >
      serve
      --object-store memory
      --node-id influxdb3-local
      --log-filter info
      --without-auth
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # K6 Runner - k6 테스트 실행 서비스
  k6-runner:
    build:
      context: ./apps/k6-runner-v2
      dockerfile: Dockerfile
    ports:
      - "${K6_RUNNER_PORT:-3002}:3002"
      - "${K6_DASHBOARD_PORT:-5665}:5665"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    env_file:
      - .env # 전역 환경 변수
      - ./apps/k6-runner-v2/.env # 앱별 환경 변수 (우선순위 높음)
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - K6_DASHBOARD_PORT=${K6_DASHBOARD_PORT}
      - K6_DASHBOARD_HOST=${K6_DASHBOARD_HOST:-0.0.0.0}
      - K6_DASHBOARD_PERIOD=${K6_DASHBOARD_PERIOD:-1s}
      # InfluxDB 3.x settings
      - INFLUXDB_URL=http://influxdb:8181
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - INFLUXDB_ORG=${INFLUXDB_ORG}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
      - CONTROL_PANEL_URL=http://control-panel:3000
      # Mock server URL
      - MOCK_SERVER_URL=http://mock-server:3001
    depends_on:
      - mock-server
      - influxdb
    volumes:
      # 개발용 볼륨 마운트 (dist와 node_modules는 컨테이너 내부 것 사용)
      - ./apps/k6-runner-v2/.env:/app/.env:ro
      - /app/dist # dist 폴더는 컨테이너 내부 것 사용
      - /app/node_modules # node_modules 제외
      - /tmp:/tmp # 임시 파일용
    extra_hosts:
      - "host.docker.internal:host-gateway" # Allow access to host's localhost
    networks:
      - k6-network
    restart: unless-stopped

  # PostgreSQL - Test results storage
  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./services/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - k6-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-test_admin} -d ${POSTGRES_DB:-k6_test_history}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  k6-network:
    driver: bridge

volumes:
  postgres-data:
  influxdb-data:
