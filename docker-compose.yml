services:
  # Control Panel - Next.js UI
  control-panel:
    build:
      context: ./apps/control-panel
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    env_file:
      - ./apps/control-panel/.env
    environment:
      # PostgreSQL connection for Docker network
      - DB_HOST=postgres
      - DB_PORT=5432
      # K6 Runner and Mock Server URLs for Docker network
      - K6_RUNNER_BASE_URL=http://k6-runner:3002
      - MOCK_SERVER_URL=http://mock-server:3001
      - DATABASE_URL=postgresql://${POSTGRES_USER:-test_admin}:${POSTGRES_PASSWORD:-testpassword}@postgres:5432/${POSTGRES_DB:-k6_test_history}?schema=public
    depends_on:
      - mock-server
      - influxdb
      - postgres
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # For Docker API access
      - /tmp:/tmp # For temporary test files
      # 개발용 소스 코드 마운트 (hot reload)
      - ./apps/control-panel:/app
      - /app/node_modules # node_modules 제외
      - /app/.next # .next 빌드 폴더 제외
    extra_hosts:
      - "host.docker.internal:host-gateway" # Allow access to host's localhost
    networks:
      - k6-network
    command: npm run dev # 개발 모드로 실행

  # Mock Server - Test target
  mock-server:
    build:
      context: ./apps/mock-server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    env_file:
      - ./apps/mock-server/.env
    networks:
      - k6-network
    # 로컬 개발 시에는 빌드된 이미지를 그대로 사용
    # 소스 코드 변경 시 docker-compose up --build mock-server로 재빌드

  # InfluxDB - Metrics storage
  influxdb:
    image: influxdb:1.8
    ports:
      - "8086:8086"
    env_file:
      - ./services/influxdb/.env
    environment:
      - INFLUXDB_DB=${INFLUXDB_DB:-k6}
      - INFLUXDB_HTTP_AUTH_ENABLED=${INFLUXDB_HTTP_AUTH_ENABLED:-false}
      # 프로덕션에서 인증 활성화시 사용
      - INFLUXDB_ADMIN_USER=${INFLUXDB_ADMIN_USER:-admin}
      - INFLUXDB_ADMIN_PASSWORD=${INFLUXDB_ADMIN_PASSWORD:-your_admin_password_here}
      - INFLUXDB_USER=${INFLUXDB_USER:-k6}
      - INFLUXDB_USER_PASSWORD=${INFLUXDB_USER_PASSWORD:-your_k6_password_here}
    volumes:
      - influxdb-data:/var/lib/influxdb
      - ./services/influxdb/init-influxdb.sh:/docker-entrypoint-initdb.d/init-influxdb.sh:ro
    networks:
      - k6-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # K6 Runner - k6 테스트 실행 서비스
  k6-runner:
    build:
      context: ./apps/k6-runner-v2
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
      - "5665:5665"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s # API 포트
    env_file:
      - ./apps/k6-runner-v2/.env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - K6_DASHBOARD_PORT=${K6_DASHBOARD_PORT:-5665}
      - K6_DASHBOARD_HOST=${K6_DASHBOARD_HOST:-0.0.0.0}
    depends_on:
      - mock-server
      - influxdb
    volumes:
      # 개발용 볼륨 마운트 (dist와 node_modules는 컨테이너 내부 것 사용)
      - ./apps/k6-runner-v2/.env:/app/.env:ro
      - /app/dist # dist 폴더는 컨테이너 내부 것 사용
      - /app/node_modules # node_modules 제외
      - /tmp:/tmp # 임시 파일용
    extra_hosts:
      - "host.docker.internal:host-gateway" # Allow access to host's localhost
    networks:
      - k6-network
    restart: unless-stopped

  # PostgreSQL - Test results storage
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    env_file:
      - ./services/postgres/.env
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./services/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - k6-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-test_admin} -d ${POSTGRES_DB:-k6_test_history}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  k6-network:
    driver: bridge

volumes:
  influxdb-data:
  postgres-data:
