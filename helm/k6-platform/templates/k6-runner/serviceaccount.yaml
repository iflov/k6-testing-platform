{{- if .Values.k6Runner.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.k6Runner.serviceAccount.name }}
  labels:
    {{- include "k6-platform.labels" . | nindent 4 }}
  {{- with .Values.k6Runner.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
