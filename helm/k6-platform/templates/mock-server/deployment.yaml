apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-server
  labels:
    {{- include "k6-platform.labels" . | nindent 4 }}
    app.kubernetes.io/name: mock-server
spec:
  replicas: {{ .Values.mockServer.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: mock-server
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mock-server
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: mock-server
          image: "{{ .Values.mockServer.image.repository }}:{{ .Values.mockServer.image.tag }}"
          imagePullPolicy: {{ .Values.mockServer.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          env:
            - name: NODE_ENV
              value: {{ .Values.mockServer.env.NODE_ENV | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.mockServer.resources | nindent 12 }}
