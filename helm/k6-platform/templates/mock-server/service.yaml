apiVersion: v1
kind: Service
metadata:
  name: mock-server
  labels:
    {{- include "k6-platform.labels" . | nindent 4 }}
    app.kubernetes.io/name: mock-server
spec:
  type: {{ .Values.mockServer.service.type }}
  ports:
    - port: {{ .Values.mockServer.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- if and (eq .Values.mockServer.service.type "NodePort") .Values.mockServer.service.nodePort }}
      nodePort: {{ .Values.mockServer.service.nodePort }}
      {{- end }}
  selector:
    app.kubernetes.io/name: mock-server
    app.kubernetes.io/instance: {{ .Release.Name }}
