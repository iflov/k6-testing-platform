apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-panel
  labels:
    {{- include "k6-platform.labels" . | nindent 4 }}
    app.kubernetes.io/name: control-panel
spec:
  replicas: {{ .Values.controlPanel.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: control-panel
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: control-panel
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- if .Values.controlPanel.migrations.enabled }}
      initContainers:
        - name: control-panel-migrate
          image: "{{ .Values.controlPanel.image.repository }}:{{ .Values.controlPanel.image.tag }}"
          imagePullPolicy: {{ .Values.controlPanel.image.pullPolicy }}
          command:
            - sh
            - -c
            - npm run prisma:migrate:deploy
          env:
            - name: NODE_ENV
              value: {{ .Values.controlPanel.env.NODE_ENV | quote }}
            - name: POSTGRES_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.existingSecret | default "postgres-secret" }}
                  key: {{ .Values.postgresql.secretKeys.username }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.existingSecret | default "postgres-secret" }}
                  key: {{ .Values.postgresql.secretKeys.password }}
            - name: DATABASE_URL
              value: {{ include "k6-platform.databaseUrl" . | quote }}
          resources:
            {{- toYaml .Values.controlPanel.resources | nindent 12 }}
      {{- end }}
      containers:
        - name: control-panel
          image: "{{ .Values.controlPanel.image.repository }}:{{ .Values.controlPanel.image.tag }}"
          imagePullPolicy: {{ .Values.controlPanel.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: {{ .Values.controlPanel.env.NODE_ENV | quote }}
            - name: K6_RUNNER_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: k6-platform-config
                  key: K6_RUNNER_BASE_URL
            - name: MOCK_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: k6-platform-config
                  key: MOCK_SERVER_URL
            - name: K6_DASHBOARD_URL
              valueFrom:
                configMapKeyRef:
                  name: k6-platform-config
                  key: K6_DASHBOARD_URL
            - name: NEXT_PUBLIC_K6_DASHBOARD_URL
              value: {{ .Values.controlPanel.env.NEXT_PUBLIC_K6_DASHBOARD_URL | quote }}
            - name: NEXT_PUBLIC_K6_STATUS_POLL_INTERVAL_MS
              value: {{ .Values.controlPanel.env.NEXT_PUBLIC_K6_STATUS_POLL_INTERVAL_MS | quote }}
            - name: NEXT_PUBLIC_K6_METRICS_POLL_INTERVAL_MS
              value: {{ .Values.controlPanel.env.NEXT_PUBLIC_K6_METRICS_POLL_INTERVAL_MS | quote }}
            - name: NEXT_PUBLIC_K6_PROGRESS_POLL_INTERVAL_MS
              value: {{ .Values.controlPanel.env.NEXT_PUBLIC_K6_PROGRESS_POLL_INTERVAL_MS | quote }}
            - name: NEXT_PUBLIC_K6_METRICS_TIME_RANGE
              value: {{ .Values.controlPanel.env.NEXT_PUBLIC_K6_METRICS_TIME_RANGE | quote }}
            - name: K6_METRICS_DEFAULT_TIME_RANGE
              value: {{ .Values.controlPanel.env.K6_METRICS_DEFAULT_TIME_RANGE | quote }}
            - name: K6_METRICS_STANDARD_TIME_RANGE
              value: {{ .Values.controlPanel.env.K6_METRICS_STANDARD_TIME_RANGE | quote }}
            - name: INFLUXDB_URL
              valueFrom:
                configMapKeyRef:
                  name: k6-platform-config
                  key: INFLUXDB_URL
            - name: INFLUXDB_ORG
              valueFrom:
                configMapKeyRef:
                  name: k6-platform-config
                  key: INFLUXDB_ORG
            - name: INFLUXDB_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: k6-platform-config
                  key: INFLUXDB_BUCKET
            - name: INFLUXDB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.influxdb.existingSecret | default "influxdb-token" }}
                  key: {{ .Values.influxdb.secretKeys.token }}
            - name: POSTGRES_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.existingSecret | default "postgres-secret" }}
                  key: {{ .Values.postgresql.secretKeys.username }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.existingSecret | default "postgres-secret" }}
                  key: {{ .Values.postgresql.secretKeys.password }}
            - name: DATABASE_URL
              value: {{ include "k6-platform.databaseUrl" . | quote }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.controlPanel.resources | nindent 12 }}
