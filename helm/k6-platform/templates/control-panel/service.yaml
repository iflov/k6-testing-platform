apiVersion: v1
kind: Service
metadata:
  name: control-panel
  labels:
    {{- include "k6-platform.labels" . | nindent 4 }}
    app.kubernetes.io/name: control-panel
spec:
  type: {{ .Values.controlPanel.service.type }}
  ports:
    - port: {{ .Values.controlPanel.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- if and (eq .Values.controlPanel.service.type "NodePort") .Values.controlPanel.service.nodePort }}
      nodePort: {{ .Values.controlPanel.service.nodePort }}
      {{- end }}
  selector:
    app.kubernetes.io/name: control-panel
    app.kubernetes.io/instance: {{ .Release.Name }}
