{{- if .Values.postgresql.external }}
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    {{- include "k6-platform.labels" . | nindent 4 }}
    app.kubernetes.io/name: postgres
spec:
  type: ExternalName
  externalName: {{ .Values.postgresql.host }}
  ports:
    - port: {{ .Values.postgresql.port }}
      targetPort: {{ .Values.postgresql.port }}
      protocol: TCP
{{- end }}
