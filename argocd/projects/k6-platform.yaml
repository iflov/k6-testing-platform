apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: k6-platform
  namespace: argocd
spec:
  description: GitOps project for the k6 testing platform
  sourceRepos:
    - https://github.com/your-org/k6-testing-platform.git
  destinations:
    - namespace: k6-platform
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
  orphanedResources:
    warn: true
